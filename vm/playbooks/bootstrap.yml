---
# Bare-metal orchestration.
#
# Inputs:
#   -e vm_hosts_file=/abs/or/relative/path/to/hosts.yml
#
# Modes:
#   -e hm_action=deploy    converge the cluster hosts and k3s
#   -e hm_action=teardown  optionally uninstall k3s
#
- name: Register cluster inventory from cluster config (controller)
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Normalize hm_action (extra var or default deploy)
      ansible.builtin.set_fact:
        hm_action: "{{ hm_action | default('deploy') }}"

    - name: Assert supported hm_action
      ansible.builtin.assert:
        that:
          - hm_action in ['deploy', 'teardown']
        fail_msg: "hm_action must be deploy or teardown"

    - name: Load and validate controller inventory
      ansible.builtin.include_tasks: "{{ playbook_dir | dirname }}/tasks/controller_inventory.yml"

- name: VM
  hosts: vm
  become: true
  gather_facts: true

  roles:
    - role: vm
