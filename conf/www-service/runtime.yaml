apiVersion: apps/v1
kind: Deployment
metadata:
  name: www-service
spec:
  template:
    spec:
      initContainers:
        - name: fetch-site
          image: docker.io/alpine/git:2.47.2
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - git clone --depth 1 https://github.com/getrafty-org/site.git /src
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsUser: 0
          volumeMounts:
            - name: repo
              mountPath: /src
        - name: build-site
          image: docker.io/library/node:20-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: HOME
              value: /tmp
            - name: NPM_CONFIG_CACHE
              value: /tmp/.npm
          command:
            - /bin/sh
            - -ec
            - cd /src && npm ci && npm run build && cp -R out/. /site/
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsUser: 0
          volumeMounts:
            - name: repo
              mountPath: /src
            - name: site
              mountPath: /site
            - name: tmp
              mountPath: /tmp
        - name: fix-permissions
          image: docker.io/library/busybox:1.36.1
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - chown -R 101:101 /site
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsUser: 0
          volumeMounts:
            - name: site
              mountPath: /site
      containers:
        - name: www-service
          image: docker.io/library/nginx:1.27-alpine
          volumeMounts:
            - name: site
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
      volumes:
        - name: repo
          emptyDir: {}
        - name: site
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: www-service-nginx
