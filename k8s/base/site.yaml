apiVersion: apps/v1
kind: Deployment
metadata:
  name: site
  namespace: hackamonth
  labels:
    app: site
spec:
  replicas: 1
  selector:
    matchLabels:
      app: site
  template:
    metadata:
      labels:
        app: site
    spec:
      containers:
        - name: site
          image: traefik/whoami:v1.11.0
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: site
  namespace: hackamonth
spec:
  selector:
    app: site
  ports:
    - port: 80
      targetPort: 80
