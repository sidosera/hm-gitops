---
- name: Apply Traefik ACME HelmChartConfig (kube-system)
  ansible.builtin.command: kubectl apply -f {{ hm_install_dir }}/k8s/system/traefik-acme.yaml
  environment:
    KUBECONFIG: "{{ hm_k3s_kubeconfig }}"

- name: Render Xray Ingress (host from inventory / controller_layout)
  ansible.builtin.template:
    dest: /tmp/hm-xray-ingress.yaml
    mode: "0644"
    src: xray-ingress.yaml.j2

- name: Apply HM Kubernetes stack (kustomize)
  ansible.builtin.command: kubectl apply -k {{ hm_install_dir }}/k8s/
  environment:
    KUBECONFIG: "{{ hm_k3s_kubeconfig }}"
  register: hm_kubectl_apply
  changed_when: >-
    'configured' in hm_kubectl_apply.stdout or 'created' in hm_kubectl_apply.stdout

- name: Render getrafty stack (image from controller_layout / inventory)
  ansible.builtin.template:
    dest: /tmp/hm-getrafty.yaml
    mode: "0644"
    src: getrafty.yaml.j2

- name: Apply getrafty stack
  ansible.builtin.command: kubectl apply -f /tmp/hm-getrafty.yaml
  environment:
    KUBECONFIG: "{{ hm_k3s_kubeconfig }}"

- name: Apply Xray Ingress
  ansible.builtin.command: kubectl apply -f /tmp/hm-xray-ingress.yaml
  environment:
    KUBECONFIG: "{{ hm_k3s_kubeconfig }}"

- name: Render Xray REALITY Traefik TCP route (TLS passthrough by SNI)
  ansible.builtin.template:
    dest: /tmp/hm-xray-reality-tcp.yaml
    mode: "0644"
    src: xray-reality-ingressroute.yaml.j2
  vars:
    hm_reality_server_names: "{{ hm_local_env.secrets.xray.reality.server_names }}"
  when: (hm_local_env.secrets.xray.reality | default({})).enabled | default(false) | bool

- name: Apply Xray REALITY IngressRouteTCP
  ansible.builtin.command: kubectl apply -f /tmp/hm-xray-reality-tcp.yaml
  environment:
    KUBECONFIG: "{{ hm_k3s_kubeconfig }}"
  when: (hm_local_env.secrets.xray.reality | default({})).enabled | default(false) | bool

- name: Remove Xray REALITY IngressRouteTCP when disabled
  ansible.builtin.command: >-
    kubectl delete ingressroutetcp xray-reality -n {{ hm_k8s_namespace }} --ignore-not-found
  environment:
    KUBECONFIG: "{{ hm_k3s_kubeconfig }}"
  when: not ((hm_local_env.secrets.xray.reality | default({})).enabled | default(false) | bool)
