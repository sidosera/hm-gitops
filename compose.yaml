services:

  traefik:
    image: traefik:v3.6.9
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.web.http.redirections.entrypoint.permanent=true
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.tlschallenge=true
      - --certificatesresolvers.le.acme.email=admin@hackamonth.io
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    restart: unless-stopped

  # hackamonth.io placeholder — replace with real app
  site:
    image: traefik/whoami:v1.11.0
    labels:
      - traefik.enable=true
      - traefik.http.routers.site.rule=Host(`hackamonth.io`) || HostRegexp(`^[a-z0-9-]+\.hackamonth\.io$`)
      - traefik.http.routers.site.entrypoints=websecure
      - traefik.http.routers.site.tls=true
      - traefik.http.routers.site.tls.certresolver=le
      - traefik.http.routers.site.middlewares=security-headers
      - traefik.http.middlewares.security-headers.headers.stsSeconds=31536000
      - traefik.http.middlewares.security-headers.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.security-headers.headers.stsPreload=true
      - traefik.http.middlewares.security-headers.headers.forceSTSHeader=true
      - traefik.http.middlewares.security-headers.headers.frameDeny=true
      - traefik.http.middlewares.security-headers.headers.contentTypeNosniff=true
      - traefik.http.services.site.loadbalancer.server.port=80
    restart: unless-stopped

  # getrafty.org — image tag updated automatically by CI (getrafty-org/site workflow)
  getrafty:
    image: ghcr.io/getrafty-org/site:latest  # renovated by CI
    labels:
      - traefik.enable=true
      - traefik.http.routers.getrafty.rule=Host(`getrafty.org`) || Host(`www.getrafty.org`)
      - traefik.http.routers.getrafty.entrypoints=websecure
      - traefik.http.routers.getrafty.tls=true
      - traefik.http.routers.getrafty.tls.certresolver=le
      - traefik.http.routers.getrafty.middlewares=security-headers
      - traefik.http.services.getrafty.loadbalancer.server.port=80
    restart: unless-stopped

volumes:
  letsencrypt:
